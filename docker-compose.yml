# builds locally with host UID/GID injected to avoid Permission denied on .jekyll-cache
services:
  jekyll:
    build:
      context: .
      args:
        GROUPID: 1002
        GROUPNAME: kts
        USERID: 1002
        USERNAME: kts
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
